<svg viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" width="480" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1f;stop-opacity:1" />
    </linearGradient>

    <!-- Eye glow gradient -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.9" />
      <stop offset="60%" style="stop-color:#0088cc;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#0044aa;stop-opacity:0" />
    </radialGradient>

    <!-- Signal pulse gradient -->
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:0.8" />
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="60%" style="stop-color:#ccefff" />
      <stop offset="100%" style="stop-color:#00f0ff" />
    </linearGradient>

    <!-- Lab text gradient -->
    <linearGradient id="labGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#aa00ff" />
      <stop offset="100%" style="stop-color:#ff44aa" />
    </linearGradient>

    <!-- Glow filter for icon -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow for eye -->
    <filter id="eyeFilter" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow for signals -->
    <filter id="signalGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="480" height="200" rx="18" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#00f0ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="480" y2="50"/>
    <line x1="0" y1="100" x2="480" y2="100"/>
    <line x1="0" y1="150" x2="480" y2="150"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
  </g>

  <!-- ===== ICON GROUP — eye with signal bars ===== -->
  <g transform="translate(52, 100)" filter="url(#eyeFilter)">

    <!-- Eye outer shape (almond) -->
    <ellipse cx="0" cy="0" rx="38" ry="22" fill="none" stroke="#00f0ff" stroke-width="1.8" opacity="0.25"/>

    <!-- Eye shape clipping -->
    <path d="M-38,0 Q-19,-30 0,-30 Q19,-30 38,0 Q19,30 0,30 Q-19,30 -38,0 Z"
          fill="none" stroke="url(#signalGrad)" stroke-width="2"/>

    <!-- Iris glow -->
    <circle cx="0" cy="0" r="16" fill="url(#eyeGlow)" opacity="0.6"/>

    <!-- Iris ring -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.8"/>

    <!-- Pupil -->
    <circle cx="0" cy="0" r="6" fill="#00f0ff" opacity="0.95"/>

    <!-- Pupil inner dot -->
    <circle cx="0" cy="0" r="2.5" fill="#0a0a12"/>

    <!-- Pupil highlight -->
    <circle cx="-2" cy="-2" r="1.2" fill="white" opacity="0.8"/>

    <!-- Signal arcs (broadcast rings) -->
    <path d="M-8,-26 Q0,-32 8,-26" fill="none" stroke="#aa00ff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <path d="M-14,-32 Q0,-44 14,-32" fill="none" stroke="#aa00ff" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Signal pulse bar (horizontal) -->
  <rect x="18" y="133" width="68" height="2" rx="1" fill="url(#signalGrad)" opacity="0.5" filter="url(#signalGlow)"/>

  <!-- Live dot -->
  <circle cx="468" cy="28" r="5" fill="#ff3355" opacity="0.9"/>
  <circle cx="468" cy="28" r="8" fill="none" stroke="#ff3355" stroke-width="1" opacity="0.4"/>

  <!-- LIVE label -->
  <text x="454" y="23" font-family="'Courier New', monospace" font-size="8" font-weight="700"
        fill="#ff3355" text-anchor="middle" letter-spacing="2" opacity="0.85">LIVE</text>

  <!-- ===== TEXT: VIEW ===== -->
  <text x="110" y="107"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="52"
        font-weight="900"
        fill="url(#textGrad)"
        letter-spacing="-1"
        filter="url(#glow)">VIEW</text>

  <!-- ===== TEXT: Lab ===== -->
  <text x="110" y="145"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="28"
        font-weight="900"
        fill="url(#labGrad)"
        letter-spacing="6">LAB</text>

  <!-- Dot separator after LAB -->
  <circle cx="254" cy="137" r="3" fill="#ff44aa" opacity="0.9"/>

  <!-- .top suffix -->
  <text x="262" y="145"
        font-family="'Courier New', monospace"
        font-size="18"
        font-weight="400"
        fill="#ffffff"
        opacity="0.35"
        letter-spacing="2">.top</text>

  <!-- Thin accent line under VIEW -->
  <line x1="110" y1="114" x2="390" y2="114" stroke="url(#signalGrad)" stroke-width="1" opacity="0.2"/>

  <!-- Tagline -->
  <text x="110" y="168"
        font-family="'Courier New', monospace"
        font-size="10"
        fill="#00f0ff"
        opacity="0.4"
        letter-spacing="3">STREAM ANALYTICS &amp; GROWTH</text>
</svg>
